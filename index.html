<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OBI LETTERS｜読後の手紙を、誰か一人へ</title>
  <meta name="description" content="読んだ本の感想を、匿名の誰か一人と手紙形式で交換するWebサービスのMVPプロトタイプです。" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="brand" data-route="home" role="button" tabindex="0">
      <span class="brand-mark">✉</span>
      <span>OBI LETTERS</span>
    </div>
    <nav class="nav">
      <button data-route="home">ホーム</button>
      <button data-route="write">手紙を書く</button>
      <button data-route="receive">受け取る</button>
      <button data-route="box">手紙箱</button>
      <button data-route="rules">ルール</button>
    </nav>
  </header>

  <main id="app" class="app"></main>
  <footer class="site-footer">
    <div>
      <p class="footer-brand">OBI BOOKS</p>
      <p class="footer-demo-note">このサービスはデモ版です。入力した内容はこのブラウザ内にのみ保存されます。</p>
    </div>
    <button class="admin-link-small" data-route="admin">運営局</button>
  </footer>

  <template id="home-template">
    <section class="hero paper hero-split reveal" id="hero">
      <div class="hero-copy">
        <p class="eyebrow">READING LETTER SERVICE / FROM OBI BOOKS</p>
        <p class="section-code">00 / HOME</p>
        <h1>
          <span class="hero-brand">OBI LETTERS</span>
          <span class="hero-title-copy" aria-label="知らない誰かと本の感想を送り合う">
            <span class="hero-title-line">知らない</span>
            <span class="hero-title-line">誰かと</span>
            <span class="hero-title-line">本の感想を</span>
            <span class="hero-title-line">送り合う</span>
          </span>
        </h1>
        <p class="lead">このサービスは、高知市にオープン予定の書店 OBI BOOKS 店主が作成しました。本の感想を誰かに伝えたくて読書会に参加してみたけど、うまく話せなかった…（すごく楽しかったけど！）という経験があり、その気持ちをどうにかできないか、という思いで作成してみました。実際の店舗では本当の手紙を使ってやりたいと考えているのですが、試してみようと思いweb上で出来るようにしています。使ってみて感じたことや、わかりにくかったところがあれば、ぜひ教えてください。この場所を、少しずつ整えていきます。</p>

        <div class="hero-microcopy">
          <span class="label-chip">NO LIKE, NO FOLLOW</span>
          <span class="label-chip label-chip-muted">ENVELOPE SHELF</span>
          <span class="label-chip label-chip-muted">ONE LETTER ONLY</span>
        </div>

        <!-- ユーザー名未入力時 -->
        <div id="username-input-area" class="username-area paper-inset reveal">
          <h2>あなたの名前を決める</h2>
          <p class="hint">ここで入力した名前は、このサービス内であなたを識別するために使われます。本名である必要はありません。</p>
          <p class="microcopy">入力例：夜の読書人 ／ 灯子 ／ OBIの誰か ／ 山のふもとの読者</p>
          <div class="username-form-row">
            <input id="username-input" type="text" placeholder="このサービス内で使う名前" maxlength="40" />
            <button class="primary ribbon-button" id="username-save-btn">この名前で使う</button>
          </div>
          <p id="username-error" class="error-message" aria-live="polite"></p>
        </div>

        <!-- ユーザー名入力済み時 -->
        <div id="username-active-area" class="username-area username-active reveal" hidden>
          <p class="username-greeting" id="username-greeting"></p>
          <div class="hero-actions">
            <button class="primary ribbon-button" data-route="write">手紙を書く</button>
            <button class="secondary ribbon-button ribbon-button-ghost" data-route="receive">手紙を受け取る</button>
            <button class="secondary ribbon-button ribbon-button-ghost" data-scroll-to="sample-section">見本の手紙を読む</button>
            <button class="ghost" id="username-change-btn">名前を変える</button>
          </div>
        </div>

        <button class="scroll-cue" type="button" data-scroll-down>
          <span>SCROLL</span>
          <strong>一通の流れを見る</strong>
        </button>
      </div>

      <div class="hero-visual" aria-hidden="true">
        <div class="hero-stack">
          <article class="floating-envelope envelope-a">
            <p class="eyebrow">封筒 01</p>
            <h3>雨の日にだけ思い出す本</h3>
            <p>紙の端に、少しだけ青い余韻。</p>
          </article>
          <article class="floating-envelope envelope-b">
            <p class="eyebrow">封筒 02</p>
            <h3>読み終えたあと、しばらく台所に立っていた</h3>
            <p>気持ちはまだ、ページの向こう側。</p>
          </article>
          <article class="floating-envelope envelope-c">
            <p class="eyebrow">封筒 03</p>
            <h3>まだ誰にも話していない読後</h3>
            <p>静かに閉じたまま、誰かを待っています。</p>
          </article>
        </div>
      </div>
    </section>

    <section class="section-block reveal" id="overview">
      <div class="section-head">
        <p class="section-code">01 / WRITE</p>
        <h2>この場所でできること</h2>
        <p class="section-note">本を閉じたあとに残った気配を、そのまま手紙にします。</p>
      </div>
      <div class="grid-3 feature-grid">
        <article class="card feature-card reveal">
          <p class="card-label">LETTER 01</p>
          <h3>読後の手紙を書く</h3>
          <p>読んだ本のタイトル、著者名、読後に残った気持ちを書きます。上手な感想である必要はありません。</p>
        </article>
        <article class="card feature-card reveal">
          <p class="card-label">LETTER 02</p>
          <h3>封筒棚から一通選ぶ</h3>
          <p>人気順ではない封筒棚から、気になる一通を静かに選びます。選ぶこと自体が読後の時間になります。</p>
        </article>
        <article class="card feature-card reveal">
          <p class="card-label">LETTER 03</p>
          <h3>思い浮かんだ一冊を送る</h3>
          <p>届いた手紙を読んで浮かんだ一冊だけを、返信ではなく一冊の本の手紙として送ることができます。</p>
        </article>
      </div>
    </section>

    <section class="section-block reveal" id="steps">
      <div class="section-head">
        <p class="section-code">02 / RECEIVE</p>
        <h2>使い方</h2>
        <p class="section-note">読み、書き、受け取る。その流れを小さく整えています。</p>
      </div>
      <div class="step-grid">
        <article class="step-card reveal"><span>STEP 01</span><h3>名前を決める</h3><p>本名でなくてかまいません。サービス内で使う名前をひとつ決めます。</p></article>
        <article class="step-card reveal"><span>STEP 02</span><h3>読んだ本について手紙を書く</h3><p>本の感想を、便箋に書くように静かにまとめます。</p></article>
        <article class="step-card reveal"><span>STEP 03</span><h3>誰かの手紙を受け取る</h3><p>おまかせ便か封筒棚から、一通だけ選んで受け取ります。</p></article>
        <article class="step-card reveal"><span>STEP 04</span><h3>思い浮かんだ一冊があれば送る</h3><p>会話を続けるためではなく、自然に浮かんだ一冊だけを送ります。</p></article>
      </div>
    </section>

    <section class="section-block reveal" id="sample-section">
      <div class="section-head">
        <p class="section-code">03 / LETTER BOX</p>
        <h2>見本の手紙</h2>
        <p class="section-note">上手な感想ではなく、その本を読んだあとの気持ちを書いてください。</p>
      </div>
      <article class="sample-letter paper-surface reveal">
        <p class="letter-tag">SAMPLE LETTER</p>
        <p class="sample-book">『旅をする木』を読み終えた日は、少し雨が降っていました。</p>
        <p>内容を全部理解できたわけではないけれど、著者がずっと北極圏の写真を撮り続けた話だけが、なぜか残っています。遠くへ行けない夜に、遠くの森を思いました。この本を読んで、昔の自分に少しだけ手紙を書きたくなりました。</p>
        <p class="sample-note">― これは開発者が用意した見本です。実際のユーザーの手紙ではありません。</p>
      </article>
    </section>

    <section class="section-block reveal" id="safety-section">
      <div class="section-head">
        <p class="section-code">04 / SAFETY</p>
        <h2>安心して使うために</h2>
        <p class="section-note">数字よりも、静かに書けることを大事にしています。</p>
      </div>
      <div class="safety-grid">
        <article class="safety-card reveal"><h3>本名でなくて大丈夫</h3><p>この場所で使う名前は、あなたが自分で決められます。</p></article>
        <article class="safety-card reveal"><h3>いいねやランキングはありません</h3><p>評価を競うのではなく、一通ずつ読まれることに集中します。</p></article>
        <article class="safety-card reveal"><h3>送信前に確認できます</h3><p>個人情報や長い引用を入れていないか、送る前に確かめられます。</p></article>
        <article class="safety-card reveal"><h3>困った手紙は運営に相談できます</h3><p>内容に不安があるときは、相談として運営だけに伝えられます。</p></article>
      </div>
    </section>

    <section class="section-block reveal" id="obi-books-section">
      <div class="section-head section-head-wide">
        <p class="section-code">OBI BOOKS / BOOKSTORE NOTE</p>
        <h2>OBI BOOKSとの関係</h2>
      </div>
      <div class="bookstore-grid">
        <article class="bookstore-card reveal">
          <p class="label-chip label-chip-muted">FROM OBI BOOKS</p>
          <p>このサービスは、高知市にオープン予定の書店 OBI BOOKS 店主が作成しました。本の感想を誰かに伝えたくて読書会に参加してみたけど、うまく話せなかった…（すごく楽しかったけど！）という経験を、手紙という形に置きかえています。</p>
        </article>
        <article class="bookstore-card bookstore-card-highlight reveal">
          <p class="label-chip">LETTER BEFORE BOOKSTORE</p>
          <p>実際の店舗では本当の手紙を使ってやりたいと考えているのですが、試してみようと思いweb上で出来るようにしています。使ってみて感じたことや、わかりにくかったところがあれば、ぜひ教えてください。この場所を、少しずつ整えていきます。</p>
        </article>
      </div>
    </section>
  </template>

  <template id="write-template">
    <section class="paper narrow page-shell reveal">
      <p class="eyebrow">Letter after reading</p>
      <p class="section-code">05 / WRITE</p>
      <h1>読後の手紙を書く</h1>
      <p class="hint">本の内容をきれいにまとめる必要はありません。その本を読んだ日のこと、思い出したこと、残った気持ちを書いてください。</p>
      <form id="letter-form" class="form">
        <label>差出人の名前<input name="senderName" required placeholder="例：夜の読書人" /></label>
        <p class="microcopy">本名である必要はありません。この名前は手紙の差出人として相手に表示されます。メールアドレスや個人情報は表示されません。</p>
        <label>本のタイトル<input name="bookTitle" required placeholder="例：夜と霧" /></label>
        <label>著者名<input name="author" required placeholder="例：ヴィクトール・E・フランクル" /></label>
        <label>手紙のタイトル<input name="letterTitle" required placeholder="例：読み終えたあと、少しだけ黙っていた" /></label>
        <p class="microcopy">目立たせるためではなく、この手紙の気配をそっと表す言葉がおすすめです。</p>
        <div class="split">
          <label>ジャンル<select name="genre" required>
            <option>小説</option><option>エッセイ</option><option>詩歌</option><option>人文</option><option>ノンフィクション</option><option>漫画</option><option>その他</option>
          </select></label>
          <label>届け方<select name="delivery"><option>封筒棚にも並べる</option><option>おまかせ便のみ</option></select></label>
        </div>
        <label>手紙本文<textarea name="body" required rows="12" placeholder="拝啓、まだ名前を知らないあなたへ。\nこの本を読み終えたあと、私は……"></textarea></label>
        <div class="assist-box">
          <strong>送信前に確認してください</strong>
          <ul>
            <li>本名、住所、電話番号、メールアドレス、SNSアカウントなどの個人情報を書いていない。</li>
            <li>相手を攻撃したり、傷つけたりする表現を含んでいない。</li>
            <li>出会いや連絡先交換を求める内容を書いていない。</li>
            <li>本の本文を長く引用していない。</li>
            <li>ネタバレがある場合は、「ネタバレあり」を選んでいる。</li>
          </ul>
        </div>
        <label class="check"><input type="checkbox" name="safe" required /> 上記を確認し、この手紙を誰か一人へ届けます。</label>
        <div class="delivery-notice">
          <p>送られた手紙は、初期版では運営が確認してから配達します。相手を傷つける表現、個人情報、長すぎる引用などがある場合は、配達を止めることがあります。</p>
        </div>
        <button class="primary ribbon-button" type="submit">手紙を預ける</button>
      </form>
    </section>
  </template>

  <template id="receive-template">
    <section class="paper narrow center page-shell reveal">
      <p class="eyebrow">Receive a letter</p>
      <p class="section-code">06 / RECEIVE</p>
      <h1>今日はどうやって手紙を受け取りますか？</h1>
      <div class="receiver-box reveal">
        <label>受け取り名<input id="receiver-name" placeholder="例：夜の読書人" /></label>
        <p class="microcopy">「一冊の本を送る」で届く手紙は、この名前あてに届きます。</p>
        <button class="secondary ribbon-button ribbon-button-ghost" id="save-receiver-name">この名前で受け取る</button>
      </div>
      <div class="receive-grid">
        <article class="choice-card reveal">
          <p class="card-label">RANDOM LETTER</p>
          <h2>おまかせ便</h2>
          <p>どの手紙が届くかは、開くまでわかりません。</p>
          <button class="primary ribbon-button" id="random-receive">おまかせで一通受け取る</button>
        </article>
        <article class="choice-card reveal">
          <p class="card-label">ENVELOPE SHELF</p>
          <h2>封筒棚</h2>
          <p>手紙のタイトルを見て、気になる一通を選びます。</p>
          <button class="secondary ribbon-button ribbon-button-ghost" data-route="shelf">封筒棚から一通選ぶ</button>
        </article>
      </div>
      <div id="direct-result" class="result"></div>
      <div id="receive-result" class="result"></div>
    </section>
  </template>

  <template id="shelf-template">
    <section class="paper page-shell reveal">
      <p class="eyebrow">Envelope shelf</p>
      <p class="section-code">07 / SHELF</p>
      <h1>封筒棚</h1>
      <p>封筒棚に並ぶ手紙は、人気順ではありません。どの手紙も、いずれ誰か一人へ届きます。気になる一通を、静かに選んでください。</p>
      <div id="shelf-list" class="envelope-grid"></div>
    </section>
  </template>

  <template id="box-template">
    <section class="paper page-shell reveal">
      <p class="eyebrow">Your letter box</p>
      <p class="section-code">08 / LETTER BOX</p>
      <h1>手紙箱</h1>
      <p>あなたが受け取った手紙を保存しています。返信ではなく、自分だけの読後メモを残せます。</p>
      <p class="hint" id="box-receiver-name"></p>
      <div id="box-list" class="letter-list"></div>
    </section>
  </template>

  <template id="rules-template">
    <section class="paper narrow page-shell reveal">
      <p class="eyebrow">Rules</p>
      <p class="section-code">09 / RULES</p>
      <h1>利用ルール</h1>
      <ul class="rule-list">
        <li>相手を傷つける内容は送らない。</li>
        <li>個人情報や連絡先を書かない。</li>
        <li>返信を強要しない。</li>
        <li>本の本文を長く引用しない。短い一文程度にしてください。本文の長い転載やページの丸写しはしないでください。このサービスでは、本の内容を転載するのではなく、その本を読んだあなた自身の感想を書くことを大切にします。</li>
        <li>届いた手紙を無断で公開しない。</li>
        <li>困った手紙が届いた場合は、運営に相談できる。</li>
      </ul>
      <p class="hint">初期版では、運営が手紙を確認してから配達する想定です。</p>
      <p class="hint muted-note">このサービスは、専門的な相談や緊急の支援を行う場所ではありません。深刻な悩みや危険がある場合は、身近な人や専門機関に相談してください。</p>
    </section>
  </template>

  <template id="news-template">
    <section class="paper narrow page-shell reveal">
      <p class="eyebrow">News</p>
      <p class="section-code">10 / NEWS</p>
      <h1>運営からのお知らせ</h1>
      <article class="notice"><time>2026.05.23</time><h2>静かな読後便を整えています</h2><p>手紙を書く体験と受け取る体験を、少しずつ丁寧に育てています。</p></article>
    </section>
  </template>

  <template id="admin-login-template">
    <section class="paper narrow page-shell reveal">
      <p class="eyebrow">Operation room</p>
      <p class="section-code">ADMIN / LOGIN</p>
      <h1>運営室へ入る</h1>
      <p>ここから先は、手紙の配達を見守るための運営用ページです。</p>
      <form id="admin-login-form" class="form">
        <label>運営パスワード<input type="password" name="password" required placeholder="パスワードを入力" /></label>
        <button class="primary" type="submit">運営室へ入る</button>
      </form>
      <p id="admin-login-error" class="error-message" aria-live="polite"></p>
    </section>
  </template>

  <template id="admin-template">
    <section class="paper admin-page reveal">
      <div class="admin-head">
        <div>
          <p class="eyebrow">Operation room</p>
          <p class="section-code">ADMIN / DASHBOARD</p>
          <h1>運営室</h1>
          <p class="hint">公開・保留・非公開・削除を、判断しやすい流れで管理します。</p>
        </div>
        <button class="secondary" id="admin-logout">運営室を出る</button>
      </div>

      <section class="admin-stats" id="admin-stats"></section>

      <section class="admin-panel">
        <h2>手紙を探す</h2>
        <div class="admin-filters">
          <input id="admin-letter-search" type="text" placeholder="手紙タイトル、本のタイトル、差出人名で検索" />
          <select id="admin-filter-spoiler">
            <option value="all">ネタバレ: すべて</option>
            <option value="なし">ネタバレ: なし</option>
            <option value="あり">ネタバレ: あり</option>
          </select>
          <select id="admin-filter-genre">
            <option value="all">ジャンル: すべて</option>
          </select>
          <select id="admin-filter-report">
            <option value="all">相談: すべて</option>
            <option value="yes">相談あり</option>
            <option value="no">相談なし</option>
          </select>
          <select id="admin-filter-date">
            <option value="all">投稿日: すべて</option>
            <option value="today">投稿日: 今日</option>
            <option value="7d">投稿日: 7日以内</option>
            <option value="30d">投稿日: 30日以内</option>
          </select>
        </div>
      </section>

      <div class="admin-tabs" id="admin-tabs">
        <button class="admin-tab" data-admin-tab="pending">未確認</button>
        <button class="admin-tab" data-admin-tab="published">公開中</button>
        <button class="admin-tab" data-admin-tab="onHold">保留中</button>
        <button class="admin-tab" data-admin-tab="private">非公開</button>
        <button class="admin-tab" data-admin-tab="deleted">削除済み</button>
        <button class="admin-tab" data-admin-tab="reports">相談</button>
        <button class="admin-tab" data-admin-tab="users">読み手たち</button>
        <button class="admin-tab" data-admin-tab="settings">運営室設定</button>
      </div>

      <div class="admin-stack">
        <section class="admin-panel" data-admin-panel="letters">
          <h2 id="admin-letters-heading">手紙一覧</h2>
          <div id="admin-letters"></div>
        </section>

        <section class="admin-panel" data-admin-panel="reports" hidden>
          <h2>相談一覧</h2>
          <div id="admin-reports"></div>
        </section>

        <section class="admin-panel" data-admin-panel="users" hidden>
          <h2>読み手たち</h2>
          <div class="admin-user-search">
            <input id="admin-user-search" type="text" placeholder="ユーザー名で検索" />
          </div>
          <div id="admin-users"></div>
        </section>

        <section class="admin-panel" data-admin-panel="settings" hidden>
          <h2>運営室設定</h2>
          <p class="hint">デモデータの初期化など、環境操作を行います。</p>
          <button class="danger" id="reset-demo">デモデータを初期化</button>
        </section>
      </div>

      <div id="admin-toast" class="admin-toast" aria-live="polite"></div>

      <div class="admin-modal" id="admin-letter-modal" hidden>
